name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl request with retry
        run: |
          curl --fail --silent --show-error \
               --max-time 10 \
               --retry 3 \
               https://fivrrchatbot.onrender.com/health